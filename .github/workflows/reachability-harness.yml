name: Extend Reachability Harness

on:
  push:
    branches:
      - master

jobs:
  run-reachability-harness:
    name: Run reachability harness extension
    if: github.event.repository.fork == false && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.collect_patch.outputs.has_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Copilot CLI
        run: npm install --global @github/copilot@1.0.8

      - name: Run extend reachability harness with Copilot PAT
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          chmod +x ./extend-reachability-harness.sh
          ./extend-reachability-harness.sh --yolo -p

      - name: Collect reachability changes as patch
        id: collect_patch
        run: |
          set -euo pipefail
          PATHS=(
            nge-platform-jvm/src/test/java/org/ngengine/platform/jvm
            nge-platform-jvm/src/main/resources/META-INF/native-image/org.ngengine/nge-platform-jvm/reachability-metadata.json
            nge-platform-jvm/build.gradle
          )

          if git diff --quiet -- "${PATHS[@]}"; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --binary -- "${PATHS[@]}" > reachability.patch
          if [ ! -s reachability.patch ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Upload reachability patch
        if: steps.collect_patch.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: reachability-patch
          path: reachability.patch
          if-no-files-found: error

  create-reachability-pr:
    name: Create PR with reachability updates
    if: needs.run-reachability-harness.outputs.has_changes == 'true'
    needs:
      - run-reachability-harness
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download reachability patch
        uses: actions/download-artifact@v4
        with:
          name: reachability-patch
          path: .

      - name: Apply patch
        run: git apply --whitespace=nowarn reachability.patch

      - name: Confirm reachability files changed
        id: verify
        run: |
          set -euo pipefail
          PATHS=(
            nge-platform-jvm/src/test/java/org/ngengine/platform/jvm
            nge-platform-jvm/src/main/resources/META-INF/native-image/org.ngengine/nge-platform-jvm/reachability-metadata.json
            nge-platform-jvm/build.gradle
          )

          if git diff --quiet -- "${PATHS[@]}"; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.verify.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          base: master
          branch: automation/reachability-harness-${{ github.run_id }}
          delete-branch: true
          commit-message: "ci(reachability): extend reachability harness"
          title: "ci(reachability): extend reachability harness"
          body: |
            Automated update generated by `extend-reachability-harness.sh --yolo -p`.

            This PR only includes reachability-related harness/metadata/build updates.
          add-paths: |
            nge-platform-jvm/src/test/java/org/ngengine/platform/jvm
            nge-platform-jvm/src/main/resources/META-INF/native-image/org.ngengine/nge-platform-jvm/reachability-metadata.json
            nge-platform-jvm/build.gradle
