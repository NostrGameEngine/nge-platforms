name: SpotBugs Analysis

on:
  push: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
      
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
        
    - name: Run SpotBugs with SARIF output
      run: |
        ./gradlew --no-daemon spotbugsMain --console=plain -PenableSpotBugs=true
        ./gradlew --no-daemon spotlessCheck --console=plain

    - name: Merge SpotBugs SARIF runs
      run: node .github/scripts/merge-sarif-runs.mjs reports/spotbugs reports/spotbugs/spotbugs.sarif
    
    - name: Upload reports
      uses: actions/upload-artifact@v6
      with:
        name: reports
        path: reports
      
    - name: List files in reports directory
      run: find reports -type f | sort
      
    - name: Upload SpotBugs SARIF file
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: reports/spotbugs/spotbugs.sarif
        category: spotbugs
